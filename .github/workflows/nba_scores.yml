name: NBA Live Scores

on:
  workflow_dispatch: # Permette a cron-job.org di avviarlo a mano con priorità massima

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Installa dipendenze
        run: |
          pip install pandas nba_api supabase python-dotenv

      - name: Esegui aggiornamento punteggi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: python scripts/fetch_scores.py